name: Android Debug Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Modify app module's applicationId
        run: |
          echo "🔄 修改 app 模块的 applicationId 为 gudao.gudaoapp.udp"
          if [ -f app/build.gradle ]; then
            sed -i 's/applicationId "[^"]*"/applicationId "gudao.gudaoapp.udp"/g' app/build.gradle
          fi
          if [ -f app/build.gradle.kts ]; then
            sed -i 's/applicationId = "[^"]*"/applicationId = "gudao.gudaoapp.udp"/g' app/build.gradle.kts
          fi
          echo "✅ 包名修改完成"

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK to Release "test"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test            # Release 对应的 Git 标签，若不存在会自动创建
          name: test                # Release 标题
          files: app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
